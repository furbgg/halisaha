spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: true

  flyway:
    enabled: false

  mail:
    host: localhost
    port: 25
    properties:
      mail:
        smtp:
          auth: false

stripe:
  secret-key: sk_test_placeholder
  webhook-secret: whsec_test_placeholder
  currency: eur

jwt:
  secret: dGVzdC1zZWNyZXQta2V5LWZvci11bml0LXRlc3RzLW9ubHktMTIzNDU2Nzg5MA==
  access-token-expiration: 900000
  refresh-token-expiration: 604800000
