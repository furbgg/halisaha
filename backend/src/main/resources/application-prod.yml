spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME:${PGUSER:}}
    password: ${DB_PASSWORD:${PGPASSWORD:}}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: public
  flyway:
    enabled: true
    baseline-on-migrate: true
  mail:
    host: ${MAIL_HOST:smtp.sendgrid.net}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:apikey}
    password: ${SENDGRID_API_KEY:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  forward-headers-strategy: NATIVE

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://halisaha.at}

app:
  base-url: ${APP_BASE_URL:https://halisaha.at}

logging:
  level:
    root: WARN
    com.halisaha: INFO
    org.hibernate.SQL: WARN
