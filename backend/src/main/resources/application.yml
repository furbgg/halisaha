spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Europe/Vienna

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

jwt:
  secret: ${JWT_SECRET:}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

totp:
  encryption-key: ${TOTP_ENCRYPTION_KEY:}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:3001,http://127.0.0.1:5173}

stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  currency: eur

# Actuator & Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      roles: ADMIN
  info:
    env:
      enabled: true

app:
  admin-email: ${ADMIN_EMAIL:}

info:
  app:
    name: Halisaha Reservation System
    version: 1.0.0
    description: Halı Saha Reservierungssystem
